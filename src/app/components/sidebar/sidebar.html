<div class="card flex justify-content-center">
    <!-- label="Menu" -->
    <p-button (click)="visible = true" icon="pi pi-bars" styleClass="p-button-text p-button-secondary"></p-button> 

    <p-drawer [(visible)]="visible" [style]="{ width: '300px', 'border-right': 'none' }" [modal]="true">
        
        <ng-template pTemplate="header">
            <div class="flex align-items-center gap-3 py-2">
                <div class="flex align-items-center justify-content-center border-round bg-blue-50" style="width: 32px; height: 32px">
                    <i class="pi pi-google text-blue-600"></i>
                </div>
                <span class="font-bold text-xl text-900">Q-Hub</span>
            </div>
        </ng-template>

        <div class="py-3">
            <ul class="list-none p-0 m-0">
                <li class="mb-2">
                    <div pRipple class="nav-item active">
                        <i class="pi pi-th-large mr-3"></i>
                        <span class="font-medium">Dashboard</span>
                    </div>
                </li>
                <li class="mb-2">
                    <div pRipple class="nav-item">
                        <i class="pi pi-bell mr-3"></i>
                        <span class="font-medium">Alerts</span>
                    </div>
                </li>

                <li class="mt-4 mb-2 px-3">
                    <span class="text-xs font-bold text-400 uppercase tracking-wider">AI Intelligence</span>
                </li>
                <li class="mb-2">
                    <div pRipple class="nav-item">
                        <i class="pi pi-sparkles mr-3 text-purple-500"></i>
                        <span class="font-medium">AI Case Handling</span>
                    </div>
                </li>
                <li class="mb-2">
                    <div pRipple class="nav-item">
                        <i class="pi pi-chart-bar mr-3"></i>
                        <span class="font-medium">QA Score Reports</span>
                    </div>
                </li>
            </ul>
        </div>

        <ng-template pTemplate="footer">
            <div class="border-top-1 surface-border py-4 px-1 flex align-items-center gap-3">
                <p-avatar image="https://primefaces.org/cdn/primeng/images/demo/avatar/amyelsner.png" shape="circle" size="large"></p-avatar>
                <div class="flex flex-column">
                    <span class="font-bold text-900">Amy Elsner</span>
                    <small class="text-500">QA Analyst</small>
                </div>
                <p-button icon="pi pi-sign-out" styleClass="p-button-rounded p-button-text p-button-danger ml-auto"></p-button>
            </div>
        </ng-template>

    </p-drawer>
</div>
